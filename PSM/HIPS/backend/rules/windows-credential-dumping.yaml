rule:
  id: "windows-credential-dumping"
  name: "Windows Credential Dumping Attempt"
  description: "Detects Mimikatz and other credential dumping tools targeting LSASS memory or SAM/SYSTEM registry hives — critical threat in any Windows environment"
  enabled: true
  severity: "critical"
  category: "credential_access"

  conditions:
    event_type: "process_create"
    platform:
      - "windows"

    any:
      - field: "process_name"
        operator: "in"
        value: ["mimikatz.exe", "mimikatz", "mimilove.exe", "wce.exe", "fgdump.exe", "pwdump.exe"]

      - field: "process_cmdline"
        operator: "regex"
        value: "(?i)mimikatz|sekurlsa|lsadump|kerberos::list"

      - field: "process_cmdline"
        operator: "regex"
        value: "(?i)procdump.+lsass"

      - field: "process_cmdline"
        operator: "regex"
        value: "(?i)rundll32.+comsvcs.+MiniDump"

      - field: "process_cmdline"
        operator: "regex"
        value: "(?i)reg\\s+save\\s+HKLM\\\\(SAM|SYSTEM|SECURITY)"

      - field: "process_cmdline"
        operator: "regex"
        value: "(?i)ntdsutil"

  actions:
    - type: "alert"
      priority: "critical"
      message: "CRITICAL: Credential dumping attempt detected: {process_cmdline}"

    - type: "block_process"
      target: "process_pid"

    - type: "log"

  metadata:
    author: "CHIPS Security Team"
    created: "2026-05-07"
    tags: ["credential-dumping", "mimikatz", "lsass", "sam", "windows", "datacentre"]
    references:
      - "https://attack.mitre.org/techniques/T1003/"
      - "https://attack.mitre.org/techniques/T1003/001/"
